<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Alrzrii's Closet</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--surface:#141414;--surface2:#1c1c1c;--surface3:#232323;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f0f0;--muted:#888;
  --green:#7fff6e;--blue:#4fc3f7;--red:#ff6b6b;--orange:#ffb347;
  --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh}

/* ── UTILS ── */
.hidden{display:none!important}
.tag{display:inline-block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:500;padding:3px 10px;border-radius:4px}
.tag-mc{background:rgba(127,255,110,.1);color:var(--green)}
.tag-misc{background:rgba(79,195,247,.1);color:var(--blue)}
.tag-tool{background:rgba(255,107,107,.1);color:var(--red)}
.tag-other{background:rgba(255,179,71,.1);color:var(--orange)}
.btn{font-family:var(--fb);font-size:13px;font-weight:500;padding:9px 20px;border-radius:100px;border:.5px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;transition:all .18s}
.btn:hover{background:var(--surface2)}
.btn-solid{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn-solid:hover{opacity:.85;background:var(--text)}
.btn-danger{border-color:rgba(255,107,107,.3);color:var(--red)}
.btn-danger:hover{background:rgba(255,107,107,.08)}

/* ── OVERLAY / MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border:.5px solid var(--border2);border-radius:16px;padding:36px;width:100%;max-width:440px;position:relative}
.modal h2{font-family:var(--fh);font-size:24px;font-weight:800;margin-bottom:6px;letter-spacing:-.5px}
.modal .sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.modal-x{position:absolute;top:16px;right:18px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}
.modal-x:hover{color:var(--text)}
.form-group{margin-bottom:14px}
.form-group label{font-size:11px;color:var(--muted);display:block;margin-bottom:5px;letter-spacing:.06em;text-transform:uppercase}
.form-group input,.form-group textarea,.form-group select{width:100%;background:var(--surface2);border:.5px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-family:var(--fb);font-size:14px;outline:none;transition:border-color .18s}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:rgba(255,255,255,.25)}
.form-group textarea{resize:vertical;min-height:80px}
.form-group select option{background:var(--surface2)}
.form-actions{display:flex;gap:10px;margin-top:6px}
.form-actions .btn{flex:1;text-align:center}
.err-msg{font-size:12px;color:var(--red);margin-top:8px;min-height:16px}

/* ── AUTH PAGE ── */
#auth-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.auth-box{width:100%;max-width:400px}
.auth-logo{font-family:var(--fh);font-size:22px;font-weight:800;margin-bottom:8px}
.auth-logo span{color:var(--green)}
.auth-tagline{font-size:13px;color:var(--muted);margin-bottom:36px}
.auth-tabs{display:flex;gap:0;margin-bottom:28px;border:.5px solid var(--border2);border-radius:10px;overflow:hidden}
.auth-tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .18s}
.auth-tab.active{background:var(--text);color:var(--bg)}
.auth-note{font-size:12px;color:var(--muted);margin-top:16px;text-align:center}
.auth-note a{color:var(--green);cursor:pointer;text-decoration:none}
.skip-btn{margin-top:20px;width:100%;text-align:center;font-size:12px;color:var(--muted);cursor:pointer;padding:8px}
.skip-btn:hover{color:var(--text)}

/* ── MAIN LAYOUT ── */
#main-page{display:none}
.site{max-width:1040px;margin:0 auto;padding:0 24px 80px}

nav{display:flex;align-items:center;justify-content:space-between;padding:26px 0 36px;border-bottom:.5px solid var(--border);margin-bottom:56px;flex-wrap:wrap;gap:12px}
.logo{font-family:var(--fh);font-size:18px;font-weight:800;letter-spacing:-.5px}
.logo span{color:var(--green)}
.nav-right{display:flex;align-items:center;gap:14px}
.nav-user{font-size:12px;color:var(--muted)}
.nav-user strong{color:var(--text)}
.nav-badge{font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(127,255,110,.12);color:var(--green);letter-spacing:.08em;text-transform:uppercase;font-weight:500}
.nav-links{display:flex;gap:20px}
.nav-links a{font-size:13px;color:var(--muted);text-decoration:none;letter-spacing:.04em;text-transform:uppercase;transition:color .2s;cursor:pointer}
.nav-links a:hover,.nav-links a.active{color:var(--text)}

/* ── HERO ── */
.hero{margin-bottom:60px}
.hero-label{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--green);font-weight:500;margin-bottom:14px}
#hero-title{font-family:var(--fh);font-size:clamp(36px,6vw,62px);font-weight:800;line-height:1;letter-spacing:-2px;margin-bottom:18px;outline:none}
#hero-title .dim{color:var(--muted)}
#hero-sub{font-size:15px;color:var(--muted);max-width:460px;line-height:1.7;font-weight:300;outline:none}
.edit-hint{font-size:11px;color:rgba(127,255,110,.5);margin-top:10px;display:none}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:56px}
.stat{background:var(--surface);padding:20px 24px}
.stat-num{font-family:var(--fh);font-size:32px;font-weight:800;letter-spacing:-1px;margin-bottom:3px}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}

/* ── TABS / FILTERS ── */
.section-tabs{display:flex;gap:0;margin-bottom:28px;border:.5px solid var(--border2);border-radius:10px;overflow:hidden;width:fit-content}
.section-tab{padding:9px 20px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .18s;font-family:var(--fb)}
.section-tab.active{background:var(--text);color:var(--bg)}
#projects-section,#dashboard-section{display:none}
#projects-section.active,#dashboard-section.active{display:block}

/* ── FILTER PILLS ── */
.filter-row{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap;align-items:center}
.filter-btn{font-family:var(--fb);font-size:11px;font-weight:500;padding:6px 14px;border-radius:100px;border:.5px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;letter-spacing:.04em;text-transform:uppercase;transition:all .18s}
.filter-btn:hover{border-color:rgba(255,255,255,.22);color:var(--text)}
.filter-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.admin-actions{display:flex;gap:8px;margin-left:auto}

/* ── PROJECT GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1px;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:48px}
.card{background:var(--surface);padding:26px;transition:background .18s;cursor:pointer;position:relative}
.card:hover{background:var(--surface2)}
.card .tag{margin-bottom:14px}
.card h3{font-family:var(--fh);font-size:17px;font-weight:700;margin-bottom:7px;letter-spacing:-.3px}
.card p{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:18px}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.card-meta{font-size:11px;color:rgba(255,255,255,.22)}
.card-actions{display:flex;gap:6px;align-items:center}
.card-arrow{width:26px;height:26px;border-radius:50%;border:.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);transition:all .18s}
.card:hover .card-arrow{border-color:var(--green);color:var(--green);background:rgba(127,255,110,.08)}
.icon-btn{width:26px;height:26px;border-radius:50%;border:.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;background:none;color:var(--muted);transition:all .18s}
.icon-btn:hover{background:var(--surface2);color:var(--text)}
.icon-btn.del:hover{border-color:rgba(255,107,107,.4);color:var(--red);background:rgba(255,107,107,.08)}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}

/* ── DOWNLOAD CARD ── */
.dl-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:10px}
.dl-card-info h4{font-family:var(--fh);font-size:15px;font-weight:700;margin-bottom)3px}
.dl-card-info p{font-size:12px;color:var(--muted)}
.dl-card-right{display:flex;gap:8px;align-items:center}
.dl-size{font-size:11px;color:var(--muted);white-space:nowrap}
.files-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.files-header h3{font-family:var(--fh);font-size:16px;font-weight:700}

/* ── DASHBOARD ── */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.dash-panel{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:24px}
.dash-panel h3{font-family:var(--fh);font-size:15px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.dash-panel h3 .badge{font-size:10px;padding:2px 8px;border-radius:4px;background:var(--surface2);color:var(--muted);font-weight:400;letter-spacing:.06em}

/* messages */
.msg-list{display:flex;flex-direction:column;gap:12px;max-height:320px;overflow-y:auto}
.msg{background:var(--surface2);border-radius:10px;padding:14px}
.msg-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.msg-author{font-size:12px;font-weight:500}
.msg-author.owner{color:var(--green)}
.msg-time{font-size:11px;color:var(--muted)}
.msg-text{font-size:13px;color:var(--muted);line-height:1.6}
.msg-replies{margin-top:10px;padding-top:10px;border-top:.5px solid var(--border);display:flex;flex-direction:column;gap:8px}
.reply{background:var(--surface);border-radius:8px;padding:10px 12px}
.reply .msg-author{font-size:11px}
.reply .msg-text{font-size:12px}
.msg-input-row{display:flex;gap:8px;margin-top:14px}
.msg-input-row input{flex:1;background:var(--surface2);border:.5px solid var(--border2);border-radius:8px;padding:9px 14px;color:var(--text);font-family:var(--fb);font-size:13px;outline:none}
.msg-input-row input:focus{border-color:rgba(255,255,255,.22)}
.msg-input-row button{padding:9px 16px;border-radius:8px;border:.5px solid var(--border2);background:transparent;color:var(--text);font-family:var(--fb);font-size:13px;cursor:pointer;transition:all .18s;white-space:nowrap}
.msg-input-row button:hover{background:var(--surface2)}

/* categories manager */
.cat-list{display:flex;flex-direction:column;gap:8px}
.cat-item{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border-radius:8px;padding:10px 14px}
.cat-item-left{display:flex;align-items:center;gap:10px}
.cat-dot{width:8px;height:8px;border-radius:50%}
.cat-name{font-size:13px;font-weight:500}
.cat-count{font-size:11px;color:var(--muted)}
.add-cat-row{display:flex;gap:8px;margin-top:10px}
.add-cat-row input{flex:1;background:var(--surface2);border:.5px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-family:var(--fb);font-size:13px;outline:none}
.add-cat-row input:focus{border-color:rgba(255,255,255,.22)}

/* site settings */
.settings-list{display:flex;flex-direction:column;gap:12px}
.setting-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.setting-row label{font-size:13px;color:var(--muted)}
.setting-row input{background:var(--surface2);border:.5px solid var(--border2);border-radius:8px;padding:7px 12px;color:var(--text);font-family:var(--fb);font-size:13px;outline:none;width:200px}
.setting-row input:focus{border-color:rgba(255,255,255,.22)}

footer{border-top:.5px solid var(--border);padding-top:24px;font-size:12px;color:rgba(255,255,255,.2);display:flex;justify-content:space-between}

/* ── VIEW MODAL ── */
.view-modal-inner{max-width:500px}
.view-modal-inner h2{font-family:var(--fh);font-size:26px;font-weight:800;margin-bottom:10px;letter-spacing:-.5px}
.view-modal-inner .desc{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:20px}
.view-modal-inner .meta-row{font-size:11px;color:rgba(255,255,255,.25);text-transform:up
